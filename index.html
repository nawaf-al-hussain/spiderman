    <!-- Set dark theme BEFORE React mounts to avoid light-mode flash.
         The Spider-Man game-menu aesthetic is dark-first. Users can still
         toggle to light via the navbar button, but the initial paint should
         match the design intent. -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('theme');
          var theme = saved || 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
